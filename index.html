<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>¡Vamos! — испанский с нуля до разговорного</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Onest:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<style>
:root{
  --ink:#152238; --paper:#FBF7EE; --card:#FFFFFF;
  --azul:#2450D6; --azul-dark:#1A3AA0; --sol:#F5B301;
  --terra:#E4572E; --verde:#1F9D55; --line:#E8E0D0; --mut:#8B8578;
  --r:18px; --shadow:0 2px 0 rgba(21,34,56,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Onest',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));}
h1,h2,h3{font-family:'Unbounded',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--azul)}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}

/* плавное появление экранов */
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#app>*{animation:rise .3s ease both}
#app>*:nth-child(2){animation-delay:.05s}
#app>*:nth-child(3){animation-delay:.1s}
#app>*:nth-child(4){animation-delay:.15s}
#app>*:nth-child(5){animation-delay:.2s}

header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:2px solid var(--ink)}
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;max-width:560px;margin:0 auto}
.logo{font-family:'Unbounded';font-weight:900;font-size:1.15rem;letter-spacing:-.02em}
.logo span{color:var(--azul)}
.hstats{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:4px;font-weight:700;font-size:.85rem;
  background:var(--card);border:2px solid var(--ink);border-radius:99px;padding:4px 10px;box-shadow:var(--shadow)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.pill.bump{animation:pop .4s ease}

nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--card);
  border-top:2px solid var(--ink);padding-bottom:env(safe-area-inset-bottom)}
.nv{display:flex;max-width:560px;margin:0 auto}
.nv button{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.66rem;font-weight:600;color:var(--mut);transition:color .15s}
.nv button .i{font-size:1.25rem;line-height:1;transition:transform .15s}
.nv button.on{color:var(--azul)}
.nv button.on .i{transform:translateY(-2px) scale(1.1)}

.hero{margin:20px 0 16px;background:var(--azul);color:#fff;border:2px solid var(--ink);
  border-radius:var(--r);padding:22px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::after{content:'';position:absolute;right:-46px;top:-46px;width:150px;height:150px;border-radius:50%;
  background:var(--sol);border:2px solid var(--ink);animation:sun 7s ease-in-out infinite}
@keyframes sun{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.hero h1{font-size:1.6rem;font-weight:900;position:relative;z-index:1}
.hero p{margin-top:6px;opacity:.92;font-size:.9rem;position:relative;z-index:1;max-width:75%}
.wod{margin-top:14px;position:relative;z-index:1;background:rgba(255,255,255,.14);border-radius:12px;
  padding:10px 12px;display:flex;align-items:center;gap:10px}
.wod b{font-size:1.05rem}
.wod small{display:block;opacity:.85}
.spk{width:38px;height:38px;min-width:38px;border-radius:50%;background:var(--sol);color:var(--ink);
  border:2px solid var(--ink);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.spk:active{transform:scale(.9)}
.spk.sm{width:32px;height:32px;min-width:32px;font-size:.85rem}
.gtl{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--paper);
  border:2px solid var(--ink);font-size:.85rem;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink)}

.prog{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
.pcard{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}
.pcard .n{font-family:'Unbounded';font-weight:700;font-size:1.25rem;color:var(--azul)}
.pcard .l{font-size:.68rem;font-weight:600;color:var(--mut);margin-top:2px}

.sech{font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin:20px 2px 10px}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:15px 13px;
  text-align:left;box-shadow:var(--shadow);transition:transform .1s}
.tile:active{transform:translateY(2px);box-shadow:none}
.tile .em{font-size:1.6rem}
.tile h3{font-size:.9rem;font-weight:700;margin-top:8px}
.tile p{font-size:.73rem;color:var(--mut);margin-top:3px;line-height:1.35}
.tile.due{border-color:var(--terra)}
.badge{display:inline-block;background:var(--terra);color:#fff;font-size:.66rem;font-weight:700;
  border-radius:99px;padding:2px 8px;margin-top:6px}

.lvlbar{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.lvlbar .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lvlbar h3{font-size:.95rem}
.lvlbar .pc{font-weight:700;font-size:.8rem;color:var(--mut)}
.lvlbar .bar{height:10px;background:var(--paper);border:2px solid var(--ink);border-radius:99px;overflow:hidden}
.lvlbar .bar i{display:block;height:100%;border-radius:99px;transition:width .6s ease}
.chip{display:inline-block;font-size:.62rem;font-weight:700;border:2px solid var(--ink);border-radius:99px;padding:1px 8px;vertical-align:middle}
.cA1{background:var(--sol)} .cA2{background:#F8CBB8} .cB1{background:#C6D4FB}

.lrow{width:100%;display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--ink);
  border-radius:var(--r);padding:13px;margin-bottom:10px;text-align:left;box-shadow:var(--shadow);transition:transform .1s}
.lrow:active{transform:translateY(2px);box-shadow:none}
.lnum{width:44px;height:44px;min-width:44px;border-radius:12px;border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:700;font-size:.85rem;background:var(--paper)}
.lrow.done .lnum{background:var(--verde);color:#fff}
.lrow h3{font-size:.9rem}
.lrow p{font-size:.74rem;color:var(--mut);margin-top:2px}
.lrow .chk{margin-left:auto;font-size:1.1rem;color:var(--mut)}

.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:.85rem;margin:16px 0 4px;color:var(--azul)}
.theory{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:16px;margin:12px 0;box-shadow:var(--shadow)}
.theory h3{font-size:.98rem;margin-bottom:8px}
.theory p{font-size:.9rem;line-height:1.55;margin-bottom:8px}
.theory p:last-child{margin-bottom:0}
.theory .ej{background:var(--paper);border-left:4px solid var(--sol);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:.88rem}
.vrow{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px dashed var(--line)}
.vrow:last-child{border-bottom:none}
.vrow .es{font-weight:700;font-size:.92rem}
.vrow .ru{margin-left:auto;color:#6B6455;font-size:.85rem;text-align:right;max-width:45%}
.bigbtn{display:block;width:100%;background:var(--sol);border:2px solid var(--ink);border-radius:var(--r);
  padding:15px;font-family:'Unbounded';font-weight:700;font-size:.9rem;text-align:center;
  box-shadow:0 4px 0 var(--ink);margin:18px 0 26px;color:var(--ink);transition:transform .1s}
.bigbtn:active{transform:translateY(4px);box-shadow:none}
.bigbtn.blue{background:var(--azul);color:#fff}
.bigbtn.mt0{margin-top:0}

.pbar{height:12px;background:var(--card);border:2px solid var(--ink);border-radius:99px;margin:18px 0;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--verde);width:0;transition:width .3s;border-radius:99px}
.q{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:22px 18px;
  text-align:center;box-shadow:var(--shadow);margin-bottom:16px}
.q .lbl{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.q .word{font-family:'Unbounded';font-weight:700;font-size:1.4rem;margin:12px 0 4px;line-height:1.35}
.q .word.gap{font-size:1.05rem;font-family:'Onest';font-weight:600}
.q .sub{color:var(--mut);font-size:.82rem}
.q .bigpic{font-size:4.4rem;line-height:1.15;margin:14px 0 6px;filter:drop-shadow(0 4px 0 rgba(21,34,56,.15))}
.opts{display:grid;gap:10px}
.opt{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:13px;font-size:.95rem;
  font-weight:600;text-align:center;box-shadow:var(--shadow);transition:transform .1s}
.opt:active{transform:translateY(2px);box-shadow:none}
.opt.ok{background:var(--verde);color:#fff}
.opt.bad{background:var(--terra);color:#fff;animation:shake .3s}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ansline{margin-top:12px;font-weight:700;font-size:.92rem;text-align:center}
.ansline.ok{color:var(--verde)} .ansline.bad{color:var(--terra)}
input.tin{width:100%;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:14px;
  font-size:1.05rem;font-family:inherit;text-align:center;box-shadow:var(--shadow);outline:none;color:var(--ink)}
input.tin:focus{border-color:var(--azul)}

.fcwrap{perspective:900px;margin:18px 0}
.fc{position:relative;height:240px;transform-style:preserve-3d;transition:transform .45s}
.fc.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:2px solid var(--ink);border-radius:var(--r);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center}
.face.bk{transform:rotateY(180deg);background:var(--azul);color:#fff}
.face .word{font-family:'Unbounded';font-weight:700;font-size:1.4rem;line-height:1.3}
.face .hint{font-size:.76rem;color:var(--mut)}
.face.bk .hint{color:rgba(255,255,255,.75)}
.grade{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grade button{border:2px solid var(--ink);border-radius:14px;padding:12px 6px;font-weight:700;
  font-size:.83rem;box-shadow:var(--shadow);background:var(--card)}
.grade button:active{transform:translateY(2px);box-shadow:none}
.grade .g0{background:#FBE3DC}.grade .g1{background:#FDF3D0}.grade .g2{background:#DDF2E4}
.grade small{display:block;font-weight:500;font-size:.63rem;color:#6B6455;margin-top:2px}

.scene{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:14px 16px;margin:12px 0;box-shadow:var(--shadow);font-size:.87rem;line-height:1.5}
.dlg{margin:14px 0}
.bub{max-width:88%;margin-bottom:10px;padding:11px 13px;border:2px solid var(--ink);border-radius:16px;
  background:var(--card);box-shadow:var(--shadow);font-size:.93rem;line-height:1.45;position:relative;transition:border-color .2s}
.bub.b{margin-left:auto;background:#E7EDFC;border-bottom-right-radius:4px}
.bub.a{border-bottom-left-radius:4px}
.bub .es{font-weight:600}
.bub .ru{display:none;color:#6B6455;font-size:.8rem;margin-top:5px;border-top:1px dashed var(--line);padding-top:5px}
.bub.showru .ru{display:block}
.bub .bplay{position:absolute;top:-11px;font-size:.72rem;background:var(--sol);border:2px solid var(--ink);
  border-radius:99px;padding:1px 8px;font-weight:700}
.bub.a .bplay{left:10px}.bub.b .bplay{right:10px}
.dctl{display:flex;gap:10px;margin:14px 0}
.dctl button{flex:1;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:11px;
  font-weight:700;font-size:.82rem;box-shadow:var(--shadow)}
.dctl button:active{transform:translateY(2px);box-shadow:none}
.dctl .pl{background:var(--sol)}

.srch{width:100%;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:13px 16px;
  font-size:1rem;font-family:inherit;box-shadow:var(--shadow);outline:none;margin:16px 0 12px;color:var(--ink)}
table.conj{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
table.conj td{padding:5px 6px;border-bottom:1px dashed var(--line)}
table.conj td:first-child{color:var(--mut);font-size:.75rem;width:70px}
table.conj td:not(:first-child){font-weight:600}
.tsel{display:flex;gap:6px;overflow-x:auto;padding:2px;margin:10px 0}
.tsel button{white-space:nowrap;border:2px solid var(--ink);border-radius:99px;padding:5px 12px;
  font-size:.75rem;font-weight:700;background:var(--card)}
.tsel button.on{background:var(--azul);color:#fff}

.vid{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);overflow:hidden;
  margin-bottom:14px;box-shadow:var(--shadow)}
.vid .fr{position:relative;padding-top:56.25%;background:#0b1020}
.vid iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vid .cap{padding:11px 14px}
.vid .cap h3{font-size:.85rem}
.vid .cap p{font-size:.74rem;color:var(--mut);margin-top:3px}

.fin{background:var(--card);border:2px solid var(--ink);border-radius:var(--r);padding:30px 20px;
  text-align:center;box-shadow:var(--shadow);margin:24px 0;position:relative;overflow:hidden}
.fin .em{font-size:3rem}
.fin h2{font-size:1.2rem;margin:10px 0 6px}
.fin p{color:#6B6455;font-size:.88rem;line-height:1.5}
.conf span{position:absolute;top:-10px;font-size:1.3rem;animation:fall 1.6s ease-in forwards}
@keyframes fall{to{transform:translateY(240px) rotate(140deg);opacity:0}}
.setrow{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.setrow label{font-weight:700;font-size:.85rem;display:block;margin-bottom:8px}
.setrow input[type=range]{width:100%}
.setrow select,.setrow textarea{width:100%;padding:9px;border:2px solid var(--ink);border-radius:10px;font-family:inherit;font-size:.85rem;background:var(--paper);color:var(--ink)}
.hide{display:none!important}
.timer{font-family:'Unbounded';font-weight:900;font-size:1.6rem;text-align:center;color:var(--terra)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header><div class="hd">
  <div class="logo">¡Va<span>mos</span>!</div>
  <div class="hstats">
    <div class="pill" id="pillStreak">🔥 <span id="hStreak">0</span></div>
    <div class="pill" id="pillXP">☀️ <span id="hXP">0</span></div>
  </div>
</div></header>

<main class="wrap" id="app"></main>

<nav><div class="nv">
  <button data-v="home" class="on"><span class="i">🏠</span>Главная</button>
  <button data-v="course"><span class="i">📖</span>Курс</button>
  <button data-v="dialogs"><span class="i">💬</span>Диалоги</button>
  <button data-v="practice"><span class="i">🎯</span>Практика</button>
  <button data-v="more"><span class="i">☰</span>Ещё</button>
</div></nav>

function today(){return new Date().toISOString().slice(0,10)}
function touchStreak(){const t=today();if(S.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;}
function addXP(n){S.xp+=n;touchStreak();saveS();paintHead();

/* интервальные повторения */
function srsGrade(es,g){const now=Date.now();let c=S.srs[es]||{i:0,due:now};
  if(g===0){c.i=0;c.due=now+10*60*1000;}
  else if(g===1){c.i=Math.max(1,Math.round(c.i*1.4))||1;c.due=now+c.i*864e5;}
  else{c.i=c.i===0?3:Math.round(c.i*2.3);c.due=now+c.i*864e5;}
  S.srs[es]=c;saveS();}
function dueCards(){const now=Date.now();return ALL.filter(w=>S.srs[w.es]&&S.srs[w.es].due<=now)}
function learnedCount(){return Object.keys(S.srs).length}
function pool(){const l=ALL.filter(w=>S.srs[w.es]);return l.length>=8?l:ALL.filter(w=>w.lesson<=2)}

let VOICES=[];
function pickVoices(){try{VOICES=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.indexOf('es')===0)}catch(e){}}
if(typeof speechSynthesis!=='undefined'){pickVoices();speechSynthesis.onvoiceschanged=pickVoices;}
function getVoice(){if(S.voice){const v=VOICES.find(x=>x.name===S.voice);if(v)return v}
  return VOICES.find(v=>v.lang==='es-ES')||VOICES[0]||null}
function say(t,pitch,onend){if(typeof speechSynthesis==='undefined'){if(onend)onend();return}
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);
  u.lang='es-ES';const v=getVoice();if(v)u.voice=v;
  u.rate=S.rate;if(pitch)u.pitch=pitch;if(onend)u.onend=onend;
  speechSynthesis.speak(u);}catch(e){if(onend)onend()}}
function saySlow(t){const r=S.rate;S.rate=0.6;say(t);S.rate=r;}
function gt(t){window.open('https://translate.google.com/?sl=es&tl=ru&text='+encodeURIComponent(t)+'&op=translate','_blank')}

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[¿?¡!.,;:'"«»()]/g,'').replace(/\s+/g,' ').trim()}
function eqES(ans,es){const a=norm(ans),b=norm(es);if(a===b)return true;
  return a===b.replace(/^(el|la|los|las|un|una)\s+/,'')}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function setNav(v){document.querySelectorAll('.nv button').forEach(b=>b.classList.toggle('on',b.dataset.v===v))}
function toTop(){try{window.scrollTo(0,0)}catch(e){}}

let M=null;
function picOptions(correct){
  const others=shuffle(PICALL.filter(w=>w.es!==correct.es&&EM[w.es]!==EM[correct.es]));
  const uniq=[];const seen={};
  for(const o of others){if(!seen[o.es]){uniq.push(o);seen[o.es]=1}if(uniq.length===3)break}
  return shuffle([correct,...uniq]);
}
function startLessonMix(id){
  const l=LESSONS.find(x=>x.id===id);

    app.innerHTML=prog+`<div class="q"><div class="lbl">Подставь слово в ситуацию</div>

  }else if(task.t==='tr'){
    const key=task.dir==='ru2es'?'es':'ru';
    M.cur={opts:task.opts,ans:task.w.es};window._qes=task.w.es;
    let head=task.dir==='es2ru'

      :`<div class="lbl">Как по-испански?</div><div class="word">${esc(task.w.ru)}</div>`;
    app.innerHTML=prog+`<div class="q">${head}${sub}</div>
    <div class="opts">${task.opts.map((o,j)=>`<button class="opt" onclick="pickM(${j})">${esc(o[key])}</button>`).join('')}</div>`;
  }else{
    window._qes=task.w.es;
    app.innerHTML=prog+`<div class="q"><div class="lbl">Напиши по-испански</div>
    <div class="word" style="font-size:1.15rem">${esc(task.w.ru)}</div>
    <div class="sub">акценты можно не ставить</div></div>
    <input class="tin" id="min" autocomplete="off" autocapitalize="off" placeholder="Пиши здесь..."
     onkeydown="if(event.key==='Enter')checkMW()">
    <div class="ansline" id="mans"></div>
    <button class="bigbtn blue" style="margin-top:16px" onclick="checkMW()">Проверить</button>`;
    const inp=document.getElementById('min');if(inp)inp.focus();
  }
  toTop();
}
function pickM(j){
  const task=M.tasks[M.i];const cur=M.cur;
  let good,correctIdx;
  if(task.t==='gap'){good=cur.opts[j]===cur.ans;correctIdx=cur.opts.indexOf(cur.ans);}
  else{good=cur.opts[j].es===cur.ans;correctIdx=cur.opts.findIndex(o=>o.es===cur.ans);}
  document.querySelectorAll('.opt').forEach((b,k)=>{b.onclick=null;
    if(k===correctIdx)b.classList.add('ok');else if(k===j)b.classList.add('bad');});
  if(good){M.ok++;addXP(5);}
  if(task.t==='gap'){
    const full=task.g[0].replace('___',task.g[1]);const ru=task.g[3];
    const a=document.getElementById('mans');
    if(a){a.innerHTML=esc(full)+(ru?'<br><span style="font-weight:500;font-size:.8rem;color:var(--mut)">'+esc(ru)+'</span>':'');
      a.className='ansline '+(good?'ok':'bad');}
    say(full);
    setTimeout(()=>{M.i++;renderM()},good?1500:2400);
  }else{
    if(!good)srsGrade(cur.ans,0);
    say(cur.ans);
    setTimeout(()=>{M.i++;renderM()},900);
  }
}
function checkMW(){
  const task=M.tasks[M.i];const el=document.getElementById('min');
  const v=el?el.value:'';if(!v.trim())return;
  const good=eqES(v,task.w.es);const a=document.getElementById('mans');
  if(a){a.textContent=good?('✓ ¡Correcto! '+task.w.es):('✗ Правильно: '+task.w.es);
    a.className='ansline '+(good?'ok':'bad');}
  say(task.w.es);
  if(good){M.ok++;addXP(8);}else{srsGrade(task.w.es,0);}
  const b=document.querySelector('.bigbtn');if(b)b.onclick=null;
  setTimeout(()=>{M.i++;renderM()},good?900:1900);
}
function finM(){
  const total=M.tasks.length;const pass=M.ok>=Math.ceil(total*0.7);
  if(M.lesson){
    const l=LESSONS.find(x=>x.id===M.lesson);
    l.vocab.forEach(([es])=>{if(!S.srs[es])S.srs[es]={i:0,due:Date.now()}});
    if(pass&&!S.lessonsDone.includes(M.lesson)){S.lessonsDone.push(M.lesson);addXP(30);}
    saveS();
  }
  app.innerHTML=`<div class="fin">${pass?confetti():''}
    <div class="em">${M.ok===total?'🏆':pass?'☀️':'💪'}</div>
    <h2>${M.ok} из ${total}</h2>
    <p>${M.ok===total?'¡Perfecto! Безупречно.':pass?'¡Muy bien! Слова добавлены в карточки для повторения.':'No pasa nada — глянь слова ещё раз и попробуй снова.'}</p>
    <button class="bigbtn blue" style="margin-top:20px" onclick="${M.lesson?('vLesson('+M.lesson+')'):'vPractice()'}">Продолжить</button>
  </div>`;paintHead();
}

let Q=null;
function buildQuiz(words,n,mode){
  const qs=shuffle(words).slice(0,Math.min(n,words.length)).map(w=>{
    const dir=mode==='listen'?'listen':(Math.random()<.5?'es2ru':'ru2es');
    const others=shuffle(words.filter(x=>x.es!==w.es)).slice(0,3);
    return {w,dir,opts:shuffle([w].concat(others))};});
  return {qs,i:0,ok:0,mode};}
function startQuiz(){Q=buildQuiz(pool(),10,'mix');renderQ();}
function startListen(){Q=buildQuiz(pool(),10,'listen');renderQ();
  setTimeout(()=>{if(Q&&Q.qs[0])say(Q.qs[0].w.es)},400);}
function renderQ(){
  setNav('practice');
  if(Q.i>=Q.qs.length)return finQ();
  const q=Q.qs[Q.i];const pc=Math.round(Q.i/Q.qs.length*100);
  window._qes=q.w.es;
  let head;
  if(q.dir==='listen')head=`<div class="lbl">Послушай и выбери перевод</div>
    <button class="spk" style="margin:14px auto 4px;width:56px;height:56px;font-size:1.4rem" onclick="say(window._qes)">🔊</button>
    <button style="font-size:.75rem;font-weight:700;color:var(--azul)" onclick="saySlow(window._qes)">🐢 медленно</button>`;
  else if(q.dir==='es2ru')head=`<div class="lbl">Что это значит?</div><div class="word">${esc(q.w.es)}</div>
    <button class="spk sm" style="margin:8px auto 0" onclick="say(window._qes)">🔊</button>`;
  else head=`<div class="lbl">Как по-испански?</div><div class="word">${esc(q.w.ru)}</div>`;
  const key=q.dir==='ru2es'?'es':'ru';
  app.innerHTML=`
  <div class="pbar"><i style="width:${pc}%"></i></div>
  <div class="q">${head}<div class="sub">${Q.i+1} из ${Q.qs.length}</div></div>
  <div class="opts">${q.opts.map((o,j)=>`<button class="opt" onclick="pick(${j})">${esc(o[key])}</button>`).join('')}</div>`;
  toTop();
}
function pick(j){
  const q=Q.qs[Q.i];
  const good=q.opts[j].es===q.w.es;
  document.querySelectorAll('.opt').forEach((b,k)=>{b.onclick=null;
    if(q.opts[k].es===q.w.es)b.classList.add('ok');else if(k===j)b.classList.add('bad');});
  if(good){Q.ok++;addXP(5);}else{srsGrade(q.w.es,0);}
  if(q.dir!=='ru2es')say(q.w.es);
  setTimeout(()=>{Q.i++;renderQ();
    if(Q.mode==='listen'&&Q.i<Q.qs.length)setTimeout(()=>say(Q.qs[Q.i].w.es),350);},900);
}
function finQ(){
  const perfect=Q.ok===Q.qs.length;const pass=Q.ok>=Q.qs.length*0.7;
  app.innerHTML=`<div class="fin">${pass?confetti():''}
    <div class="em">${perfect?'🏆':pass?'☀️':'💪'}</div>
    <h2>${Q.ok} из ${Q.qs.length}</h2>
    <p>${perfect?'¡Perfecto! Безупречно.':pass?'¡Muy bien!':'No pasa nada — попробуй ещё раз.'}</p>
    <button class="bigbtn blue" style="margin-top:20px" onclick="vPractice()">Продолжить</button>
  </div>`;paintHead();
}

let SP=null;
function startSprint(){
  SP={score:0,t:60,words:shuffle(pool())};
  clearInterval(window._spint);
  window._spint=setInterval(()=>{if(!SP)return;SP.t--;const e=document.getElementById('sptime');
    if(e)e.textContent=SP.t;if(SP.t<=0)finSprint();},1000);
  nextSprint();}
function nextSprint(){
  setNav('practice');
  const w=SP.words[Math.floor(Math.random()*SP.words.length)];
  const wrong=shuffle(SP.words.filter(x=>x.es!==w.es))[0]||w;
  const opts=shuffle([w,wrong]);
  app.innerHTML=`
  <div class="timer" style="margin-top:20px">⏱ <span id="sptime">${SP.t}</span></div>
  <div class="q" style="margin-top:14px"><div class="lbl">Спринт · счёт: ${SP.score}</div>
  <div class="word">${esc(w.ru)}</div></div>
  <div class="opts">${opts.map(o=>`<button class="opt" onclick="pickSprint(${o.es===w.es?1:0})">${esc(o.es)}</button>`).join('')}</div>`;
}
function pickSprint(ok){if(!SP)return;if(ok){SP.score++;}else{SP.score=Math.max(0,SP.score-1);}nextSprint();}
function finSprint(){
  clearInterval(window._spint);
  if(!SP)return;
  const rec=SP.score>S.best;if(rec){S.best=SP.score;}
  addXP(SP.score*2);saveS();
  app.innerHTML=`<div class="fin">${rec?confetti():''}<div class="em">${rec?'🏆':'⚡'}</div>
  <h2>Счёт: ${SP.score}</h2><p>${rec?'Новый рекорд!':'Рекорд: '+S.best}</p>
  <button class="bigbtn blue" style="margin-top:20px" onclick="startSprint()">Ещё раз</button>
  <button class="bigbtn mt0" onclick="vPractice()">К практике</button></div>`;SP=null;
}

function playText(){let i=0;const next=()=>{if(!curT||i>=curT.sents.length)return;
  const b=document.getElementById('sent'+i);if(b)b.style.borderColor='var(--sol)';
  say(curT.sents[i][0],1,()=>{if(b)b.style.borderColor='';i++;setTimeout(next,400)});};next();}
function startTQuiz(){TQ={i:0,ok:0};renderTQ();}
function renderTQ(){
  if(TQ.i>=curT.qs.length){
    const pass=TQ.ok>=2;
    if(pass&&!S.textsDone.includes(curT.id)){S.textsDone.push(curT.id);addXP(20);saveS();}
    app.innerHTML=`<div class="fin">${pass?confetti():''}<div class="em">${pass?'📚':'👀'}</div>
    <h2>${TQ.ok} из ${curT.qs.length}</h2>
    <p>${pass?'Текст понят! Чтение — самый быстрый путь к большому словарю.':'Перечитай текст с переводом и вернись к вопросам.'}</p>
    <button class="bigbtn blue" style="margin-top:20px" onclick="vText(${curT.id})">${pass?'К тексту':'Перечитать'}</button>
    <button class="bigbtn mt0" onclick="vTexts()">Все тексты</button></div>`;return;}
  const q=curT.qs[TQ.i];
  app.innerHTML=`
  <div class="pbar"><i style="width:${Math.round(TQ.i/curT.qs.length*100)}%"></i></div>
  <div class="q"><div class="lbl">Вопрос ${TQ.i+1} из ${curT.qs.length}</div>
  <div class="word" style="font-size:1.05rem">${esc(q.q)}</div></div>
  <div class="opts">${q.o.map((o,j)=>`<button class="opt" onclick="pickTQ(${j})">${esc(o)}</button>`).join('')}</div>`;
  toTop();
}
function pickTQ(j){const q=curT.qs[TQ.i];const good=j===q.a;
  document.querySelectorAll('.opt').forEach((b,k)=>{b.onclick=null;
    if(k===q.a)b.classList.add('ok');else if(k===j)b.classList.add('bad');});
  if(good){TQ.ok++;addXP(5);}
  setTimeout(()=>{TQ.i++;renderTQ()},900);}

function numToEs(n){
  const u=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte'];
  const v=['veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const d=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const c=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===100)return 'cien';
  let out='';const h=Math.floor(n/100),r=n%100;
  if(h)out=c[h];
  if(r){const part=r<=20?u[r]:(r<30?v[r-21]:d[Math.floor(r/10)]+(r%10?' y '+u[r%10]:''));
    out=out?out+' '+part:part;}
  return out||u[0];
}
let NUM=null;
function startNums(){NUM={i:0,ok:0,total:8};nextNum();}
function nextNum(){
  setNav('practice');
  if(NUM.i>=NUM.total){
    app.innerHTML=`<div class="fin">${NUM.ok>=6?confetti():''}<div class="em">${NUM.ok>=6?'💯':'🔢'}</div>
    <h2>${NUM.ok} из ${NUM.total}</h2>
    <p>Числа на слух — цены, время, телефоны. Тренируй, пока не станет рефлексом.</p>
    <button class="bigbtn blue" style="margin-top:20px" onclick="startNums()">Ещё раз</button>
    <button class="bigbtn mt0" onclick="vPractice()">К практике</button></div>`;addXP(NUM.ok*2);return;}
  const pools=[[0,20],[21,99],[100,999]];
  const p=pools[Math.min(2,Math.floor(NUM.i/3))];
  NUM.n=p[0]+Math.floor(Math.random()*(p[1]-p[0]+1));
  NUM.word=numToEs(NUM.n);
  app.innerHTML=`
  <div class="pbar"><i style="width:${Math.round(NUM.i/NUM.total*100)}%"></i></div>
  <div class="q"><div class="lbl">Послушай число и напиши цифрами</div>
  <button class="spk" style="margin:14px auto 4px;width:56px;height:56px;font-size:1.4rem" onclick="say(NUM.word)">🔊</button>
  <button style="font-size:.75rem;font-weight:700;color:var(--azul)" onclick="saySlow(NUM.word)">🐢 медленно</button>
  <div class="sub">${NUM.i+1} из ${NUM.total}</div></div>
  <input class="tin" id="numin" inputmode="numeric" autocomplete="off" placeholder="Например: 42"
   onkeydown="if(event.key==='Enter')checkNum()">
  <div class="ansline" id="numans"></div>
  <button class="bigbtn blue" style="margin-top:16px" onclick="checkNum()">Проверить</button>`;
  setTimeout(()=>say(NUM.word),300);
  toTop();
}
function checkNum(){
  const el=document.getElementById('numin');const v=(el?el.value:'').trim();
  if(!v)return;
  const good=parseInt(v,10)===NUM.n;
  const a=document.getElementById('numans');
  if(a){a.textContent=(good?'✓ ':'✗ ')+NUM.n+' — '+NUM.word;
    a.className='ansline '+(good?'ok':'bad');}
  if(good){NUM.ok++;addXP(4);}
  const b=document.querySelector('.bigbtn');if(b)b.onclick=null;
  setTimeout(()=>{NUM.i++;nextNum()},good?1000:2200);
}
